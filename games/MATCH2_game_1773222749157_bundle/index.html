    <script>
    const MathEngine = (function() {\n    class RNG {\n        constructor(seed) {\n            if (typeof seed === 'string') {\n                let h = 2166136261 >>> 0;\n                for (let i = 0; i < seed.length; i++) {\n                    h = Math.imul(h ^ seed.charCodeAt(i), 16777619);\n                }\n                this.seed = h >>> 0;\n            } else {\n                this.seed = seed >>> 0;\n            }\n        }\n        next() {\n            let t = (this.seed += 0x6D2B79F5);\n            t = Math.imul(t ^ (t >>> 15), t | 1);\n            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);\n            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n        }\n        range(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }\n        pick(array) {\n            if (!array || array.length === 0) return null;\n            return array[this.range(0, array.length - 1)];\n        }\n    }\n\n    const resolveRound = (config, seedProp) => {\n        const rng = new RNG(seedProp);\n        const presentationSeed = rng.next() * 1000000;\n        \n        const s = config.scratch || {};\n        const tiers = s.prizes && s.prizes.length > 0 ? s.prizes : [\n                { id: 'tier_win_big', payout: 100, probability: 0.1, weight: 10 },\n                { id: 'tier_lose', payout: 0, probability: 0.9, weight: 90 }\n        ];\n\n        const rnd = rng.next();\n        let accumulatedProb = 0;\n        let selectedTier = tiers[tiers.length - 1];\n        \n        let totalWeight = 0;\n        tiers.forEach(t => totalWeight += (t.weight || t.probability || 0));\n        if(totalWeight === 0) totalWeight = 1;\n\n        for (const tier of tiers) {\n            const p = (tier.weight || tier.probability || 0) / totalWeight;\n            accumulatedProb += p;\n            if (rnd < accumulatedProb) {\n                selectedTier = tier;\n                break;\n            }\n        }\n\n        const internalConfig = {\n            category: s.mechanic?.type === 'lucky_number' ? 'BONUS' : 'MATCH',\n            layout: s.layout,\n            mechanic: s.mechanic,\n            symbols: s.symbols,\n            bonus: s.bonus,\n            features: s.features,\n            prizes: tiers\n        };\n        \n        const tierWithWin = { ...selectedTier, isWin: selectedTier.payout > 0, value: selectedTier.payout };\n\n        let revealMap = [];\n        const type = s.mechanic?.type || 'match_3';\n        if (type.includes('match') || type === 'progression') {\n            revealMap = resolveMatchRound(internalConfig, tierWithWin, rng);\n        } else if (type === 'find_symbol') {\n            revealMap = resolveGridRound(internalConfig, tierWithWin, rng);\n        } else if (type === 'lucky_number') {\n            revealMap = resolveBonusRound(internalConfig, tierWithWin, rng);\n        } else {\n            revealMap = resolveMatchRound(internalConfig, tierWithWin, rng);\n        }\n\n        return {\n            roundId: 'rnd_' + Date.now() + '_' + Math.floor(rng.next() * 1000),\n            finalPrize: selectedTier.payout * (config.scratch?.math?.ticketPrice || 1),\n            isWin: selectedTier.payout > 0,\n            tierId: selectedTier.id,\n            revealMap,\n            presentationSeed\n        };\n    };\n\n    const resolveMatchRound = (config, tier, rng) => {\n        let matchCount = 3;\n        if (config.mechanic?.matchCount) {\n            matchCount = config.mechanic.matchCount;\n        } else if (config.mechanic?.type) {\n            const parts = config.mechanic.type.split('_');\n            if (parts.length === 2 && !isNaN(parts[1])) matchCount = parseInt(parts[1]);\n        }\n        \n        const rows = config.layout?.rows || 3;\n        const cols = config.layout?.columns || 3;\n        const totalCells = rows * cols;\n        if (matchCount > totalCells) matchCount = totalCells;\n\n        const map = new Array(totalCells).fill('');\n        const symbolCounts = {};\n\n        const pickSafeSymbol = (excludeSymbol = null) => {\n            const pool = config.symbols.loseVariants && config.symbols.loseVariants.length > 0\n                ? config.symbols.loseVariants\n                : ['LOSE', 'TRY_AGAIN', 'NO_LUCK', 'ALMOST'];\n\n            const limit = matchCount - 1;\n            let candidates = pool.filter(s => {\n                if (s === excludeSymbol) return false;\n                const current = symbolCounts[s] || 0;\n                return current < limit;\n            });\n\n            if (candidates.length === 0) {\n                candidates = pool.filter(s => s !== excludeSymbol);\n                if (candidates.length === 0) candidates = pool;\n                candidates.sort((a, b) => (symbolCounts[a]||0) - (symbolCounts[b]||0));\n                candidates = candidates.slice(0, Math.max(1, Math.floor(candidates.length / 2)));\n            }\n\n            const choice = rng.pick(candidates);\n            symbolCounts[choice] = (symbolCounts[choice] || 0) + 1;\n            return choice;\n        };\n\n        if (tier.isWin) {\n            let winSymbol = 'WIN';\n            if (tier.symbolId) winSymbol = tier.symbolId;\n            else if (config.symbols.win && config.symbols.win.length > 0) winSymbol = rng.pick(config.symbols.win);\n            else if (config.symbols.customAssets) {\n                    const w = config.symbols.customAssets.find(a => a.id === 'win' || a.label === 'win');\n                    if(w) winSymbol = w.url;\n            }\n\n            const indices = new Set();\n            let attempts = 0;\n            while (indices.size < matchCount && attempts < 100) {\n                indices.add(rng.range(0, totalCells - 1));\n                attempts++;\n            }\n            if (indices.size < matchCount) {\n                    for(let i=0; i<totalCells; i++) { if(!indices.has(i)) { indices.add(i); if(indices.size === matchCount) break; } }\n            }\n\n            for (let i = 0; i < totalCells; i++) {\n                if (indices.has(i)) {\n                    map[i] = winSymbol;\n                    symbolCounts[winSymbol] = (symbolCounts[winSymbol] || 0) + 1;\n                } else {\n                    map[i] = pickSafeSymbol(winSymbol);\n                }\n            }\n        } else {\n            for (let i = 0; i < totalCells; i++) {\n                map[i] = pickSafeSymbol(null);\n            }\n        }\n        return map;\n    };\n\n    const resolveGridRound = (config, tier, rng) => {\n            const rows = config.layout?.rows || 3;\n            const cols = config.layout?.columns || 3;\n            const totalCells = rows * cols;\n            const map = new Array(totalCells).fill('BLANK');\n            if (tier.isWin) {\n                const prizePos = rng.range(0, totalCells - 1);\n                map[prizePos] = (config.symbols.win && config.symbols.win[0]) || 'PRIZE';\n            }\n            return map;\n    };\n    \n    const resolveBonusRound = (config, tier, rng) => {\n        const rows = config.layout?.rows || 3;\n        const cols = config.layout?.columns || 3;\n        const totalCells = rows * cols;\n        \n        const losePool = config.symbols?.loseVariants || ['MISS'];\n        const loseSymbol = rng.pick(losePool);\n        const map = new Array(totalCells).fill(loseSymbol);\n        \n        const isBonusWin = tier.id.includes('bonus') || tier.isWin;\n        if (isBonusWin) {\n            const idx = rng.range(0, totalCells - 1);\n            map[idx] = config.bonus?.triggerSymbol || (config.symbols?.bonus && config.symbols.bonus.length > 0) || 'BONUS';\n        }\n        return map;\n    };\n\n    return { resolveRound };\n})();
    </script>

    <script>
        
        // --- Setup Debugger ---

        // --- PARTICLE SYSTEM ---
        class ParticleSystem {
            constructor(app) {
                this.app = app;
                this.particles = [];
                this.container = new PIXI.Container();
                this.app.stage.addChild(this.container);
                this.enabled = true;
                this.confettiEnabled = true;
            }

            emitDust(x, y) {
                if (!this.enabled) return;
                for (let i = 0; i < 3; i++) {
                    const p = new PIXI.Graphics();
                    p.rect(0, 0, 4, 4); 
                    p.fill({ color: 0xFFFFFF, alpha: 0.8 });
                    p.x = x + (Math.random() - 0.5) * 20;
                    p.y = y + (Math.random() - 0.5) * 20;
                    p.vx = (Math.random() - 0.5) * 2;
                    p.vy = (Math.random() - 0.5) * 2;
                    p.life = 1.0;
                    p.type = 'dust';
                    this.container.addChild(p);
                    this.particles.push(p);
                }
            }

            emitConfetti() {
                if (!this.confettiEnabled) return;
                for (let i = 0; i < 100; i++) {
                    const colors = [0xFF0000, 0x00FF00, 0x0000FF, 0xFFFF00, 0xFF00FF, 0x00FFFF];
                    const p = new PIXI.Graphics();
                    p.rect(0, 0, 8, 8);
                    p.fill({ color: colors[Math.floor(Math.random() * colors.length)] });
                    p.x = this.app.screen.width / 2;
                    p.y = this.app.screen.height / 2;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 5;
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                    p.life = 2.0;
                    p.type = 'confetti';
                    p.rotation = Math.random();
                    this.container.addChild(p);
                    this.particles.push(p);
                }
            }

            update(delta) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.life -= 0.02 * delta;
                    p.x += p.vx * delta;
                    p.y += p.vy * delta;
                    
                    if (p.type === 'confetti') {
                        p.vy += 0.2 * delta; // Gravity
                        p.rotation += 0.1 * delta;
                    }

                    p.alpha = p.life;

                    if (p.life <= 0) {
                        this.container.removeChild(p);
                        this.particles.splice(i, 1);
                    }
                }
            }
        }

        async function runAutoplay() {
            const rounds = Math.min(1000, Math.max(1, parseInt(document.getElementById('autoplay-rounds').value, 10) || 10));
            const turbo = document.getElementById('autoplay-turbo').checked;
            const stopOnBonus = document.getElementById('autoplay-stop-bonus').checked;
            closeAutoplayModal();
            shellState.isAutoPlaying = true;
            const myId = ++shellState.autoplayId;
            updateFooterDisplay();
            for (let i = 0; i < rounds && shellState.isAutoPlaying && myId === shellState.autoplayId; i++) {
                if (shellState.balance < shellState.bet) break;
                buyTicket();
                if (stopOnBonus && shellState.win > 0) break;
                var delayMs = turbo ? 0 : 1500;
                await new Promise(r => setTimeout(r, delayMs));
                shellState.gameState = 'idle';
                updateFooterDisplay();
            }
            shellState.isAutoPlaying = false;
            shellState.gameState = 'idle';
            updateFooterDisplay();
        }

                        }
                    }
                };

                // 3. Asset Loading (Custom Offline Loader)
                const imageExtensions = ['.png', '.jpg', '.jpeg', '.webp', '.svg'];

                // Broader traversal to catch everything
                const traverse = (obj) => {
                    if (!obj) return;
                    if (typeof obj === 'string') {
                        // Check if it looks like an asset path OR has image extension OR is Base64
                        if (obj.includes('assets/') || 
                            imageExtensions.some(ext => obj.toLowerCase().endsWith(ext)) ||
                            obj.startsWith('data:image')) {
                            assetUrls.add(obj);
                        }
                    } else if (Array.isArray(obj)) {
                        obj.forEach(traverse);
                    } else if (typeof obj === 'object') {
                        Object.values(obj).forEach(traverse);
                    }
                };
                traverse(config);
                log(`Found ${assetUrls.size} potential assets`);

                // Preload Images via DOM 
                let loadedCount = 0;
                
                // [FIX] Add timeout to prevent infinite loading
                const loadTimeout = setTimeout(() => {
                    log('Asset loading timed out - forcing start', 'warn');
                    startGame();
                }, 5000);

                const loadPromises = Array.from(assetUrls).map(url => {
                    // Filter non-images
                    const lower = url.toLowerCase();
                    const isImage = imageExtensions.some(ext => lower.endsWith(ext)) || url.startsWith('data:image');
                    
                    if (!isImage) {
                        return Promise.resolve();
                    }

                    return new Promise((resolve) => {

                        img.onload = () => {

                            }
                            resolve();
                        };
                        img.onerror = (e) => {
                            log(`Failed to load: ${url}`, 'warn'); // Warn but continue
                            resolve(); 
                        };
                        img.src = url;
                    });
                });

                if (loadPromises.length > 0) {
                    await Promise.all(loadPromises);
                }
                clearTimeout(loadTimeout);
                log("Asset Loading Complete");

                         startOverlay.style.opacity = '0';

                    if (btn) btn.onclick = onStart;

                    startGame();

                document.getElementById('loading').innerHTML = '<div style="color:red">Error: ' + e.message + '</div>';
                log(e.message, 'error');
                console.error(e);
            }
        }

        function startGame() {

// Helper: Create Gradient Texture from CSS string
function createGradientTexture(w, h, css) {
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    var ctx = c.getContext('2d');
    
    // Simple Linear Parsing (Heuristic)
    // Supports: "linear-gradient(to bottom, #color1, #color2)"
    // Falls back to vertical gradient if complex
    var grd = ctx.createLinearGradient(0, 0, 0, h);
    if (css.includes('to right')) grd = ctx.createLinearGradient(0, 0, w, 0);
    else if (css.includes('to bottom right')) grd = ctx.createLinearGradient(0, 0, w, h);
    
    // Extract colors (Simple regex for hex/rgb)
    var colors = css.match(/(#[0-9a-f]{3,8}|rgba?([^)]+)|[a-z]+)/gi) || ['#ffffff', '#000000'];
    // Filter out 'linear-gradient', 'to', 'bottom' etc.
    var stopColors = colors.filter(c => c.startsWith('#') || c.startsWith('rgb') || c.startsWith('hsl'));
    
    if (stopColors.length >= 2) {
        stopColors.forEach((color, i) => {
            grd.addColorStop(i / (stopColors.length - 1), color);
        });
    } else {
        grd.addColorStop(0, stopColors[0] || '#ffffff');
        grd.addColorStop(1, stopColors[0] || '#ffffff');
    }
    
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);
    return PIXI.Texture.from(c);
}

            // B. Card Body (Layer 1)

            if (!surfaceUrl && !foilTexture) {
                 var potentialSurface = Array.from(assetUrls).filter(function(u) { return u.toLowerCase().includes('cover') || u.toLowerCase().includes('surface') || u.toLowerCase().includes('overlay'); });
                 if (potentialSurface.length > 0) surfaceUrl = potentialSurface[0];
            }

            log('Surface URL: ' + surfaceUrl + ', Texture: ' + foilTexture);
            
            var cover;
             if (surfaceUrl && textureCache.has(surfaceUrl)) {
                  cover = PIXI.Sprite.from(surfaceUrl);
                  cover.width = cardWidth + 20;
                  cover.height = cardHeight + 20;
                  cover.x = startX - 10;
                  cover.y = startY - 10;
                  
                  log('Surface Loaded (Image)');
                  
             } else if (foilTexture || (surfaceUrl && (surfaceUrl.includes('foil') || surfaceUrl.includes('gold') || surfaceUrl.includes('silver') || surfaceUrl.includes('sand')))) {
                  // Procedural Foil Generation (Matching ScratchGridPreview.tsx)
                  log('Detected Procedural Preset: ' + (foilTexture || surfaceUrl));
                  var canvas = document.createElement('canvas');
                  canvas.width = 512; canvas.height = 512;
                  var ctx = canvas.getContext('2d');
                  
                  var type = foilTexture || surfaceUrl || 'silver';
                  type = type.toLowerCase();

                   if (type.includes('sand')) {
                       ctx.fillStyle = '#e6c288'; ctx.fillRect(0,0,512,512);
                       for(var i=0; i<50000; i++) { ctx.fillStyle = Math.random() > 0.5 ? '#d4a76a' : '#f0d9b5'; ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2); }
                   } else if (type.includes('gold')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#FFD700'); grd.addColorStop(0.5, '#FDB931'); grd.addColorStop(1, '#FFFFFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                   } else if (type.includes('silver')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#E0E0E0'); grd.addColorStop(0.5, '#A0A0A0'); grd.addColorStop(1, '#FFFFFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                   } else if (type.includes('platinum')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#E5E4E2'); grd.addColorStop(0.5, '#BFC0C2'); grd.addColorStop(1, '#FFFFFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                   } else if (type.includes('rose') || type.includes('rose-gold')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#F4C4C2'); grd.addColorStop(0.5, '#B76E79'); grd.addColorStop(1, '#FFFFFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                   } else if (type.includes('copper')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#B87333'); grd.addColorStop(0.5, '#8A5A44'); grd.addColorStop(1, '#FFFFFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                   } else if (type.includes('holographic') || type.includes('holo')) {
                       var grd = ctx.createLinearGradient(0,0,512,512); 
                       grd.addColorStop(0, '#FF0000'); grd.addColorStop(0.14, '#FF7F00'); grd.addColorStop(0.28, '#FFFF00'); 
                       grd.addColorStop(0.42, '#00FF00'); grd.addColorStop(0.56, '#0000FF'); grd.addColorStop(0.70, '#4B0082'); 
                       grd.addColorStop(1, '#9400D3'); 
                       ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                       // Add sparkle
                       for(var i=0; i<1000; i++) { ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2); }
                   } else {
                       // Fallback Silver
                       var grd = ctx.createLinearGradient(0,0,512,512); grd.addColorStop(0, '#a0a0a0'); grd.addColorStop(0.5, '#e0e0e0'); grd.addColorStop(1, '#a0a0a0'); ctx.fillStyle = grd; ctx.fillRect(0,0,512,512);
                       for(var i=0; i<10000; i++) { ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2); }
                   }
                  var tex = PIXI.Texture.from(canvas);
                  cover = new PIXI.Sprite(tex);
                  cover.width = cardWidth + 20;
                  cover.height = cardHeight + 20;
                  cover.x = startX - 10;
                  cover.y = startY - 10;
             } else {
                  // Fallback
                  cover = new PIXI.Graphics();
                  cover.rect(startX - 10, startY - 10, cardWidth + 20, cardHeight + 20);
                  cover.fill({ color: 0xFFD700 });
             }
             surfaceContainer.addChild(cover);

            // D. Masking (Shape Support)
            // [FIX] Support custom shape masks (layers.shape.maskUrl)
            const maskRT = PIXI.RenderTexture.create({ width: app.screen.width, height: app.screen.height });
            const maskSprite = new PIXI.Sprite(maskRT); // Used as opacity mask for surface
            
            // Mask Base (White = Hidden, Transparent = Shown) - Erase logic inverted inside scratch loop
            // For now, we fill White (Covered)
            const fullQuad = new PIXI.Graphics().rect(0, 0, app.screen.width, app.screen.height).fill(0xffffff);
            
            // Apply Shape Mask if present (Cutout the card shape)
            var maskUrl = config.scratch && config.scratch.layers && config.scratch.layers.shape && config.scratch.layers.shape.maskUrl;
            if (maskUrl && textureCache.has(maskUrl)) {
                log('Applying Shape Mask: ' + maskUrl);
                // If a mask exists, we want the surface to only exist inside the mask shape?
                // Actually, PIXI masks work: where mask is visible, target is visible.
                
                // For scratch surface:
                // 1. We want the surface to conform to the card shape.
                // 2. We want the user to erase parts of it.
                
                // Let's apply the shape mask to the CONTAINER first
                var shapeMask = PIXI.Sprite.from(maskUrl);
                shapeMask.width = cardWidth;
                shapeMask.height = cardHeight;
                shapeMask.x = startX;
                shapeMask.y = startY;
                container.mask = shapeMask; // Simple global mask for the whole card
                container.addChild(shapeMask); // Must be in scene graph to work? No, for mask it doesn't need to be rendered, but let's keep it safe.
                log('Applied Container Shape Mask');
            }

            app.renderer.render({ container: fullQuad, target: maskRT });
            surfaceContainer.mask = maskSprite; // The dynamic scratch mask
            container.addChild(surfaceContainer);
            
            // Apply Audio Volumes
            // [FIX] Apply configured volumes
            if (config.scratch && config.scratch.audioVolumes) {
                 var vols = config.scratch.audioVolumes;
                 // Assuming sound vars are global or accessible via audioRefs logic (which we need to port)
                 // For now, apply to any active audio elements if we can find them
                 // TODO: Port full audio manager
                 log('Audio Volumes Configured: ' + JSON.stringify(vols));
            }
            
            // E. Frame / Overlay
            var frameUrl = config.scratch && ((config.scratch.layers && config.scratch.layers.overlay && config.scratch.layers.overlay.image) || (config.scratch.cardFrame && config.scratch.cardFrame.frameUrl) || (config.scratch.overlay && config.scratch.overlay.image));
             if (!frameUrl) {
                  var potentialFrames = Array.from(assetUrls).filter(function(u) { return u.toLowerCase().includes('frame') || u.toLowerCase().includes('border'); });
                  if (potentialFrames.length > 0) frameUrl = potentialFrames[0];
             }
             
             if (frameUrl && textureCache.has(frameUrl)) {
                 var frame = PIXI.Sprite.from(frameUrl);
                 frame.width = cardWidth + 40; // Slightly larger than card
                 frame.height = cardHeight + 40;
                 frame.x = startX - 20;
                 frame.y = startY - 20;
                 container.addChild(frame);
                 log('Frame Rendering as Overlay');
             } else {
                 // [FIX] Fallback Border Logic (If no image, DRAW the border)
                 var borderColor = (config.scratch && config.scratch.cardFrame && config.scratch.cardFrame.borderColor) || 
                                   (config.scratch && config.scratch.layers && config.scratch.layers.overlay && config.scratch.layers.overlay.color);
                 var borderWidth = (config.scratch && config.scratch.cardFrame && config.scratch.cardFrame.borderWidth) || 0;
                 
                 if (borderColor && borderWidth > 0) {
                     var border = new PIXI.Graphics();
                     var color = borderColor.startsWith('#') ? borderColor : '#000000';
                     border.roundRect(startX - 10, startY - 10, cardWidth + 20, cardHeight + 20, 16);
                     border.stroke({ width: borderWidth, color: color });
                     container.addChild(border);
                     log('Frame Rendered as Border Stroke: ' + borderWidth + 'px ' + color);
                 }
             }
             
             // G. Logo (Overlay)
             var logoUrl = (config.scratch && config.scratch.logo && config.scratch.logo.image) || (config.theme && config.theme.logo);
             if (logoUrl && textureCache.has(logoUrl)) {
                 var logo = PIXI.Sprite.from(logoUrl);
                 var logoLayout = (config.scratch && config.scratch.logo && config.scratch.logo.layout) || 'integrated';
                 var logoPosition = (config.scratch && config.scratch.logo && config.scratch.logo.customPosition);
                 
                 // Default Size/Scale Logic
                 var maxLogoW = Math.min(cardWidth * 0.6, 250);
                 var maxLogoH = 100;
                 var lScale = Math.min(maxLogoW / logo.width, maxLogoH / logo.height);
                 if (config.scratch && config.scratch.logo && config.scratch.logo.scale) {
                     lScale = lScale * (config.scratch.logo.scale / 100);
                 }
                 logo.scale.set(lScale);
                 logo.anchor.set(0.5);
                 
                 // Positioning based on Layout Mode
                 if (logoLayout === 'floating') {
                     // Independent of card (screen relative?)
                     logo.x = (app.screen.width / 2) + (logoPosition ? logoPosition.x : 0);
                     logo.y = 60 + (logoPosition ? logoPosition.y : 0);
                 } else if (logoLayout === 'pop-out') {
                    // Overlapping Top Edge
                    logo.x = startX + cardWidth/2 + (logoPosition ? logoPosition.x : 0);
                    logo.y = startY + (logoPosition ? logoPosition.y : -20);
                 } else { 
                    // 'integrated' default - Inside Card Top
                    logo.x = startX + cardWidth/2 + (logoPosition ? logoPosition.x : 0);
                    logo.y = startY + 50 + (logoPosition ? logoPosition.y : 0);
                 }
                 
                 container.addChild(logo);
                 log('Logo Rendered (' + logoLayout + ')');
             }


    // --- Init Particle System ---
    particleSystem = new ParticleSystem(app);
    particleSystem.enabled = config.scratch && config.scratch.effects && config.scratch.effects.particles;
    particleSystem.confettiEnabled = config.scratch && config.scratch.effects && config.scratch.effects.confetti;

    // --- Main Ticker ---
    app.ticker.add((delta) => {
        if (particleSystem) particleSystem.update(delta);
    });

    // F. Brush / Cursor (The Scratch Tool)
    let brush = new PIXI.Graphics().circle(0, 0, 40).fill({ color: 0x000000, alpha: 1 }); 
    
    // ... (Keep existing brush loading logic) ...
    // Check for custom brush in config
    var brushUrl = (config.scratch && config.scratch.brush && config.scratch.brush.image) || 
                   (config.scratch && config.scratch.layers && config.scratch.layers.foil && config.scratch.layers.foil.image);
    
    // [FIX] Verify brush URL is valid image
    if (brushUrl && textureCache.has(brushUrl)) {
        var bTex = textureCache.get(brushUrl);
        brush = new PIXI.Sprite(bTex);
        brush.anchor.set(0.5);
        
        var bScale = 64 / Math.max(bTex.width, bTex.height);
        brush.scale.set(bScale);
        
        log('Custom Brush Loaded');
        
        // Apply CSS Cursor
        try {
             const cursorCSS = "url('" + brushUrl + "') 32 32, auto";
             app.canvas.style.cursor = cursorCSS;
        } catch(e) {
             app.canvas.style.cursor = 'crosshair';
        }
    } else {
        app.canvas.style.cursor = 'crosshair';
    }

    // Input Handling
    app.stage.eventMode = 'static';
    app.stage.hitArea = app.screen;

    app.stage.on('pointerdown', onDragStart);
    app.stage.on('pointerup', onDragEnd);
    app.stage.on('pointerupoutside', onDragEnd);
    app.stage.on('pointermove', onDragMove);

    let scratchDistance = 0;
    let hasWon = false;

    function onDragStart() { isDrawing = true; }
    function onDragEnd() { isDrawing = false; }
    function onDragMove(e) {
        if (isDrawing) {
            const pos = e.global;
            brush.position.copyFrom(pos);
            
            // [NEW] Particles & Game Logic
            if (particleSystem) {
                // Dust
                particleSystem.emitDust(pos.x, pos.y);
                
                // [FIX] Audio: Scratch Sound
                if (window.playAudio) window.playAudio('scratch');
                
                // Simulated Win (Demo Mode)
                if (!hasWon) {
                     scratchDistance += 5; 
                     if (scratchDistance > 4000) { // Approx 800 events
                          hasWon = true;
                          particleSystem.emitConfetti();
                          
                          // [FIX] Audio: Win Sound
                          if (window.playAudio) window.playAudio('win');
                          
                          // Show Win Footer
                          var winFooter = document.getElementById('footer-win');
                          if (winFooter) {
                              winFooter.style.display = 'flex';
                              document.getElementById('footer-win-value').textContent = '500.00';
                          }
                          log('Simulated Win Triggered (Demo)');
                     }
                }
            }

            // Erase mode (Masking)
            // If using Sprite, ensure it renders alpha correctly into the mask
            brush.blendMode = 'erase'; 
            app.renderer.render({ container: brush, target: maskRT, clear: false });
        }
    }
}

function resetGame() {
    setupScene();
}


// Robust Setup
if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 1);
} else {
    window.addEventListener('DOMContentLoaded', init);
    window.addEventListener('load', init);
}
</script>
    </body>
    </html>
